{% extends "myapp/base.html" %}

{% block title %}Delete Player{% endblock %}

{% block content %}
<h1>Delete Player</h1>

<p>Are you sure you want to delete {{ record.name }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
</form>

<p><a href="{% url 'record_detail' record.pk %}">Cancel</a></p>
{% endblock %}
